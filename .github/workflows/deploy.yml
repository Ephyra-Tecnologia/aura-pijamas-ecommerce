name: Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: aura-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Criar .env.local e copiar para VM
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          NEXT_PUBLIC_MP_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_MP_PUBLIC_KEY }}
          PGTO_PRIVATE_KEY: ${{ secrets.PGTO_PRIVATE_KEY }}
          PGTO_PUBLIC_KEY: ${{ secrets.PGTO_PUBLIC_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -e

          cat > .env.local <<EOF
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
          MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
          NEXT_PUBLIC_MP_PUBLIC_KEY=${NEXT_PUBLIC_MP_PUBLIC_KEY}
          PAGARME_SECRET_KEY=${PGTO_PRIVATE_KEY}
          PAGARME_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
          PGTO_PRIVATE_KEY=${PGTO_PRIVATE_KEY}
          PGTO_PUBLIC_KEY=${PGTO_PUBLIC_KEY}
          RESEND_API_KEY=${RESEND_API_KEY}
          NEXT_PUBLIC_BASE_URL=https://aurapijamas.com.br
          EOF

          gcloud compute scp .env.local root@srv-qa-cvlt:/root/aura-pijamas-ecommerce/.env.local \
            --zone=southamerica-east1-a \
            --tunnel-through-iap

      - name: Deploy via IAP tunnel
        run: |
          gcloud compute ssh root@srv-qa-cvlt \
            --zone=southamerica-east1-a \
            --tunnel-through-iap \
            --command="
              set -e

              source /root/.nvm/nvm.sh
              cd /root/aura-pijamas-ecommerce

              echo 'Atualizando código para origin/main...'
              git fetch origin
              git checkout main
              git reset --hard origin/main
              git clean -fd

              echo 'Instalando dependências...'
              npm ci

              echo 'Gerando Prisma Client...'
              npx prisma generate

              echo 'Aplicando migrations...'
              npx prisma migrate deploy

              echo 'Buildando aplicação...'
              npm run build

              echo 'Recarregando PM2...'
              pm2 reload aura-pijamas --update-env

              echo 'Status PM2...'
              pm2 status
            "
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Criar .env.local e copiar para VM
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          PAGARME_SECRET_KEY: ${{ secrets.PGTO_PRIVATE_KEY }}
          PAGARME_WEBHOOK_SECRET: ${{ secrets.PAGARME_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" > .env.local
          echo "STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}" >> .env.local
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" >> .env.local
          echo "PAGARME_SECRET_KEY=${PAGARME_SECRET_KEY}" >> .env.local
          echo "PAGARME_WEBHOOK_SECRET=${PAGARME_WEBHOOK_SECRET}" >> .env.local
          echo "RESEND_API_KEY=${RESEND_API_KEY}" >> .env.local
          echo "NEXT_PUBLIC_BASE_URL=https://aurapijamas.com.br" >> .env.local
          gcloud compute scp .env.local root@srv-qa-cvlt:/root/aura-pijamas-ecommerce/.env.local \
            --zone=southamerica-east1-a \
            --tunnel-through-iap

      - name: Deploy via IAP tunnel
        run: |
          gcloud compute ssh root@srv-qa-cvlt \
            --zone=southamerica-east1-a \
            --tunnel-through-iap \
            --command="source /root/.nvm/nvm.sh && cd /root/aura-pijamas-ecommerce && git stash && git pull --rebase && npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build && pm2 restart aura-pijamas"